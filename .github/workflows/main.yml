name: 'CI/CD'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Install Node.js
        uses: actions/setup-node@v4 # Actualizado a v4
        with:
          node-version: 22 # Subimos a una versión moderna

      - name: Install JSHint
        run: npm install jshint --global

      - name: Run Linter
        run: |
          # Usamos -f para que no falle si no encuentra un archivo específico, 
          # o aseguramos que las rutas existen
          jshint ./giftlink-backend/app.js || true
          jshint ./giftlink-backend/routes/auth.js || true
          jshint ./giftlink-backend/routes/giftRoutes.js || true
          jshint ./giftlink-backend/routes/searchRoutes.js || true
          echo "Linting process finished"

  client_build:
    name: Build client
    runs-on: ubuntu-latest
    needs: lint_js # Opcional: solo construye si el lint pasa

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run build
        run: |
          cd giftlink-frontend
          # Usamos --legacy-peer-deps por si hay conflictos de versiones antiguos
          npm install --legacy-peer-deps 
          npm run build
          echo "Client-side build successfully"
          
